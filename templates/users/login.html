{% extends 'layouts/auth.html' %}

{% block title %}Login — Bracketmaster{% endblock %}

{% block auth_content %}
<div class="auth-card text-center">
    <h1 class="auth-title">Login</h1>
    <p class="auth-subtitle">SENTE-SE À MESA</p>

    {% if form.errors %}
        <div class="form-error" style="margin-bottom: 1rem;">
            Usuário ou senha inválidos.
        </div>
    {% endif %}

    <form method="POST" action="" class="auth-form">
        {% csrf_token %}

        <div class="form-group text-left">
            <label for="email" class="form-label">E-MAIL</label>
            <input type="email" id="email" name="email"
                   class="form-input"
                   placeholder="calabresinho@bracketmaster.gg"
                   required>
        </div>

        <div class="form-group text-left">
            <div class="label-row">
                <label for="password" class="form-label">SENHA</label>
                <a href="#" class="link-muted">ESQUECEU?</a>
            </div>
            <input type="password" id="password" name="password"
                   class="form-input"
                   placeholder="••••••••"
                   required>
        </div>

        <button type="submit" class="btn btn-auth btn-full">ENTRAR</button>
    </form>

    <div class="auth-footer-text">
        <a href="{% url 'register' %}" class="link-subtle">
            NOVO POR AQUI? CADASTRE-SE
        </a>
    </div>
</div>
{% endblock %}
