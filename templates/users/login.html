<!--Tela de Cadastro de Usuários-->
{% extends 'layouts/auth.html' %}

{% block title %}Login - Bracketmaster{% endblock %}

{% block auth_content %}
<div class="card auth-card text-center">
    <h1 class="auth-title">Login</h1>
    <p class="auth-subtitle">SENTE-SE À MESA</p>

    <form method="POST" action="" class="auth-form">
        {% csrf_token %}
        
        <div class="form-group text-left">
            <label for="email" class="form-label">E-MAIL</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="lord.calabreso@bracketmaster.gg" required>
        </div>

        <div class="form-group text-left">
            <div class="label-row">
                <label for="password" class="form-label">SENHA</label>
                <a href="#" class="link-muted">ESQUECEU?</a>
            </div>
            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full">ENTRAR</button>
    </form>

    <div class="auth-footer-text">
        <a href="{% url 'register' %}" class="link-subtle">NOVO POR AQUI? CADASTRE-SE</a>
    </div>
</div>
{% endblock %}
