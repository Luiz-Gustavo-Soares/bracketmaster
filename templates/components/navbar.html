{% load static %}
<nav class="main-navbar">
    <div class="navbar-container">

        <a href="{% url 'home' %}" class="logo-text">B</a>

        <div class="nav-links">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="#">Perfis</a>
            <a href="#">Torneios</a>
        </div>

        <div class="nav-actions">
            <div class="nav-search-container">
                <!-- O Formulário envia para a página de resultados -->
                <form action="#" method="GET" class="nav-search-form">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" name="q" placeholder="Buscar jogador..." class="nav-search-input" id="globalSearchInput" autocomplete="off">
                </form>

                <!-- O Dropdown flutuante que aparece com os resultados (oculto por padrão) -->
                <div class="search-dropdown" id="searchDropdown">
                    <div class="search-dropdown-header">Jogadores</div>
                    
                    <!-- Exemplo de usuário na lista -->
                    <a href="/perfil/NissaRevane" class="search-item">
                        <img src="{% static 'media/avatares/nissa.png' %}" alt="Nissa" class="search-item-avatar">
                        <div class="search-item-info">
                            <span class="search-item-nick">NissaRevane</span>
                            <span class="search-item-name">Nissa R.</span>
                        </div>
                    </a>

                    <!-- Exemplo de outro usuário -->
                    <a href="/perfil/GideonJura" class="search-item">
                        <img src="{% static 'media/avatares/gideon.png' %}" alt="Gideon" class="search-item-avatar">
                        <div class="search-item-info">
                            <span class="search-item-nick">GideonJura</span>
                            <span class="search-item-name">Gideon J.</span>
                        </div>
                    </a>
                    
                    <!-- Botão para ver todos -->
                    <a href="#" class="search-item-view-all">
                        Ver todos os resultados...
                    </a>
                </div>
</div>
            {% if user.is_authenticated %}
                <a href="#" class="nav-user-link">
                    <img src="{% static 'media/avatares/nissa.png' %}" alt="Avatar" class="nav-avatar">
                    <span class="nav-username">{{ user.username }}</span>
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-login-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    Entrar
                </a>
                <a href="{% url 'register' %}" class="btn-nav-register">Cadastrar</a>
            {% endif %}
        </div>

    </div>
</nav>
