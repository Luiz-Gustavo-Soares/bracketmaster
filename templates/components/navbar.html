{% load static %}
<nav class="main-navbar">
    <div class="navbar-container container">
        
        <a href="{% url 'home' %}" class="logo-text">B</a>

        <div class="nav-links">
            <a href="#">Dashboard</a>
            <a href="#">Perfis</a>
            <a href="#">Torneios</a>
        </div>

        <div class="nav-actions">
            
            {% if user.is_authenticated %}
                <a href="#" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text-primary); transition: opacity var(--transition-fast);">
                    <img src="{% static 'media/avatares/nissa.png' %}" alt="Avatar" style="width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--brand-primary); object-fit: cover;">
                    <span style="font-size: 0.875rem; font-weight: 500;">{{ user.username }}</span>
                </a>
            
            {% else %}
                <a href="{% url 'login' %}" class="nav-login-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Entrar
                </a>
                <a href="{% url 'register' %}" class="btn-nav-register">Cadastrar</a>
            {% endif %}

        </div>
    </div>
</nav>
