{% extends 'layouts/auth.html' %}

{% block title %}Senha Alterada | Bracketmaster{% endblock %}
{% block navbar %}{% endblock %}

{% block auth_content %}
<div class="auth-card text-center">
    <div style="font-size: 3rem; color: var(--success, #10b981); margin-bottom: 1rem;">
        <i class="fa-solid fa-circle-check"></i>
    </div>
    
    <h1 class="auth-title">Senha Redefinida!</h1>
    <p class="auth-subtitle">Tudo certo! Sua senha foi atualizada com sucesso. Você já pode acessar a plataforma.</p>

    <a href="{% url 'login' %}" class="btn btn-auth btn-full" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center; margin-top: 1rem;">
        ACESSAR CONTA
    </a>
</div>
{% endblock %}
